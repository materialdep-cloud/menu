<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>訂單後台</title>
</head>
<body>

<h2>📊 訂單後台</h2>
<pre id="out"></pre>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbwT36XTatuF-29yHgvwu4oO-i_SHFnCu2ea6VcY2VyiCAy0mbFy8xF85oK6RVpjXQa_dA/exec";

fetch(GAS_URL)
.then(r=>r.json())
.then(data=>{

  let total = {};
  let text = "";

  data.forEach(o=>{

    text += `👤 ${o.user} (${o.time})\n`;

    for(let k in o.order){
      let qty = o.order[k].qty || 0;
      let price = o.order[k].price || 0;

      text += `  - ${k} x${qty} = $${qty*price}\n`;

      if(!total[k]) total[k]=0;
      total[k]+=qty;
    }

    text += "\n";
  });

  text += "====================\n📦 總統計：\n";

  for(let k in total){
    text += `${k}：${total[k]} 份\n`;
  }

  document.getElementById("out").innerText = text;

});

</script>

</body>
</html>
